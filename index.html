<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tutors Valley | Live Cloud Edition</title>
   
    <!-- Fonts & Scripts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;700&family=Noto+Sans+Bengali:wght@400;700&family=Inter:wght@400;700&family=Montserrat:wght@800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
   
    <!-- Firebase SDK (Compatible Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #001f3f; }
        body { background-color: #f8fafc; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .rounded-24 { border-radius: 24px; }
        .shadow-premium { box-shadow: 0 20px 50px rgba(0, 31, 63, 0.05); }
        input:focus { outline: none; border-color: var(--primary); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
       
        #boot-loader {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="boot-loader">
        <div style="width: 40px; height: 40px; border: 4px solid #001f3f; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; font-weight: bold; color: #001f3f;">Tutors Valley Cloud Connecting...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- FIREBASE CONFIG (Updated with your Keys) ---
        const firebaseConfig = {
            apiKey: "AIzaSyC8Fn2Ew5XnvxMIgorzD40-7stW5G_AKVw",
            authDomain: "tutors-valley-b2d4c.firebaseapp.com",
            databaseURL: "https://tutors-valley-b2d4c-default-rtdb.firebaseio.com/",
            projectId: "tutors-valley-b2d4c",
            storageBucket: "tutors-valley-b2d4c.firebasestorage.app",
            messagingSenderId: "672117828971",
            appId: "1:672117828971:web:541c28538673653b04f02e"
        };

        // Initialize Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const DEFAULT_CONFIG = {
            themeColor: '#001f3f',
            logo: 'https://i.ibb.co.com/hRT1DFmF/logo.png',
            ceoImg: 'https://i.ibb.co.com/Gvm6RLwW/ceo.png',
            texts: {
                brandingName: { val: "Tutors Valley", font: "Montserrat", size: 26, color: "#ffffff" },
                motto: { val: "ঢাকার শহরে আমরাই দিচ্ছি সেরা টিউটর", font: "Hind Siliguri", size: 12, color: "#cbd5e1" },
                heroTitle: { val: "খুঁজে নিন আপনার এরিয়ার সেরা হোম টিউটর", font: "Hind Siliguri", size: 40, color: "#001f3f" },
                aboutDesc: { val: "Tutors Valley is a trusted platform for finding home tutors in Dhaka.", font: "Inter", size: 16, color: "#475569" },
                ceoName: { val: "Kabir Hasanat", font: "Poppins", size: 24, color: "#001f3f" },
                ceoTitle: { val: "CEO, Tutors Valley", font: "Inter", size: 14, color: "#64748b" },
                footerText: { val: "© 2024 Tutors Valley. All Rights Reserved.", font: "Inter", size: 12, color: "#94a3b8" }
            },
            zones: [
                { id: 1, name: "Uttara", tags: "Sector 1-14", m: "https://wa.me/1", f: "https://wa.me/2" },
                { id: 2, name: "Mirpur", tags: "Mirpur 1, 10, DOHS", m: "https://wa.me/3", f: "https://wa.me/4" },
                { id: 3, name: "Gulshan", tags: "Gulshan, Banani", m: "https://wa.me/5", f: "https://wa.me/6" },
                { id: 4, name: "Dhanmondi", tags: "Road 1-32", m: "https://wa.me/7", f: "https://wa.me/8" },
                { id: 5, name: "Bashundhara", tags: "Block A-L", m: "https://wa.me/9", f: "https://wa.me/10" },
                { id: 6, name: "Mohammadpur", tags: "Town Hall", m: "https://wa.me/11", f: "https://wa.me/12" }
            ]
        };

        const FONT_OPTIONS = ["Inter", "Poppins", "Montserrat", "Hind Siliguri", "Noto Sans Bengali", "Pacifico", "Bebas Neue"];

        function App() {
            const [page, setPage] = useState('landing');
            const [user, setUser] = useState(null);
            const [config, setConfig] = useState(DEFAULT_CONFIG);
            const [isAdminOpen, setAdminOpen] = useState(false);
            const [isInitialLoad, setIsInitialLoad] = useState(true);

            useEffect(() => {
                const configRef = db.ref('siteConfig');
                configRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setConfig(data);
                    else db.ref('siteConfig').set(DEFAULT_CONFIG);
                   
                    const session = localStorage.getItem('tv_session');
                    if (session) { setUser(JSON.parse(session)); setPage('home'); }
                   
                    setIsInitialLoad(false);
                    if(document.getElementById('boot-loader')) document.getElementById('boot-loader').style.display = 'none';
                });
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [page, isAdminOpen]);

            const saveToFirebase = (newConfig) => {
                setConfig(newConfig);
                return db.ref('siteConfig').set(newConfig);
            };

            const login = (userData) => {
                setUser(userData);
                localStorage.setItem('tv_session', JSON.stringify(userData));
                setPage('home');
            };

            const logout = () => {
                localStorage.removeItem('tv_session');
                setUser(null);
                setPage('landing');
            };

            const getTextStyle = (key) => ({
                fontFamily: config.texts[key].font,
                fontSize: `${config.texts[key].size}px`,
                color: config.texts[key].color,
                fontWeight: 'bold'
            });

            if (isInitialLoad) return null;

            return (
                <div style={{'--primary': config.themeColor}}>
                    {page === 'landing' && <LandingView config={config} setPage={setPage} getTextStyle={getTextStyle} />}
                    {page === 'login' && <LoginView config={config} login={login} />}
                    {page === 'home' && (
                        <HomeView user={user} config={config} logout={logout} openAdmin={() => setAdminOpen(true)} getTextStyle={getTextStyle} />
                    )}
                    <AnimatePresence>
                        {isAdminOpen && <AdminPanel config={config} save={saveToFirebase} close={() => setAdminOpen(false)} />}
                    </AnimatePresence>
                </div>
            );
        }

        function LandingView({ config, setPage, getTextStyle }) {
            return (
                <motion.div initial={{opacity:0}} animate={{opacity:1}} className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-white">
                    <img src={config.logo} className="w-20 mb-4" />
                    <h1 style={{...getTextStyle('brandingName'), color: config.themeColor}}>{config.texts.brandingName.val}</h1>
                    <p style={{...getTextStyle('motto'), color: '#64748b'}} className="mb-12 opacity-60 uppercase tracking-widest">{config.texts.motto.val}</p>
                    <h2 style={getTextStyle('heroTitle')} className="mb-6 max-w-2xl leading-tight">{config.texts.heroTitle.val}</h2>
                    <p style={getTextStyle('aboutDesc')} className="max-w-xl mb-10 font-normal opacity-70 leading-relaxed">{config.texts.aboutDesc.val}</p>
                    <button onClick={() => setPage('login')} className="bg-[var(--primary)] text-white px-10 py-4 rounded-24 font-bold text-lg shadow-xl hover:scale-105 active:scale-95 transition-all">লগইন / জয়েন করুন</button>
                </motion.div>
            );
        }

        function LoginView({ config, login }) {
            const [mode, setMode] = useState('login');
            const [showPass, setShowPass] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [role, setRole] = useState('tutor');

            return (
                <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-24 shadow-premium w-full max-w-md border border-slate-100">
                        <div className="flex flex-col items-center mb-6">
                            <img src={config.logo} className="w-14 mb-2" />
                            <h2 className="text-xl font-bold text-[var(--primary)]">Account Access</h2>
                        </div>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            if(email === 'kabirhasanat7@gmail.com' && pass === 'admin1') login({email, role:'admin', name:'Admin'});
                            else login({email, role, name: email.split('@')[0]});
                        }} className="space-y-4">
                            <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
                                <button type="button" onClick={() => setRole('tutor')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${role === 'tutor' ? 'bg-white shadow text-[var(--primary)]' : 'text-gray-400'}`}>টিউটর</button>
                                <button type="button" onClick={() => setRole('guardian')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${role === 'guardian' ? 'bg-white shadow text-[var(--primary)]' : 'text-gray-400'}`}>গার্ডিয়ান</button>
                            </div>
                            <input required type="email" placeholder="ইমেইল" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-100 rounded-xl outline-none" />
                            <div className="relative">
                                <input required type={showPass ? "text" : "password"} placeholder="পাসওয়ার্ড" value={pass} onChange={e => setPass(e.target.value)} className="w-full p-4 bg-slate-100 rounded-xl outline-none" />
                                <button type="button" onClick={() => setShowPass(!showPass)} className="absolute right-4 top-4 text-gray-400"><i data-lucide={showPass ? "eye-off" : "eye"} className="w-5"></i></button>
                            </div>
                            <button type="submit" className="w-full py-4 bg-[var(--primary)] text-white rounded-xl font-bold shadow-lg">প্রবেশ করুন</button>
                        </form>
                    </div>
                </motion.div>
            );
        }

        function HomeView({ user, config, logout, openAdmin, getTextStyle }) {
            const [genderSel, setGenderSel] = useState({});
            const [loadingZone, setLoadingZone] = useState(null);

            const handleJoin = (z, gender) => {
                setLoadingZone(z.id);
                setTimeout(() => {
                    setLoadingZone(null);
                    window.location.href = gender === 'male' ? z.m : z.f;
                }, 1500);
            };

            return (
                <div className="min-h-screen bg-white">
                    <header className="p-6 shadow-md flex justify-between items-center" style={{backgroundColor: config.themeColor}}>
                        <div className="w-10">
                            {user.role === 'admin' && <button onClick={openAdmin} className="p-2 bg-white/10 rounded-full text-white"><i data-lucide="settings" className="w-5"></i></button>}
                        </div>
                        <div className="flex flex-col items-center text-center">
                            <img src={config.logo} className="w-8 mb-1" />
                            <h1 style={getTextStyle('brandingName')}>{config.texts.brandingName.val}</h1>
                        </div>
                        <div className="w-10 flex justify-end">
                            <button onClick={logout} className="p-2 text-red-300"><i data-lucide="log-out" className="w-5"></i></button>
                        </div>
                    </header>

                    <main className="p-6 max-w-7xl mx-auto w-full">
                        <h2 style={{...getTextStyle('heroTitle'), textAlign:'center', marginTop:'40px', marginBottom:'40px', color: config.themeColor}}>আপনার এরিয়া নির্বাচন করুন</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {config.zones.map(z => (
                                <div key={z.id} className="bg-white p-8 rounded-24 shadow-premium border border-slate-100 flex flex-col items-center text-center">
                                    <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[var(--primary)] mb-4"><i data-lucide="map-pin"></i></div>
                                    <h3 className="text-xl font-bold mb-1">{z.name}</h3>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">{z.tags}</p>
                                   
                                    <select className="w-full p-3 bg-slate-50 rounded-xl font-bold text-sm mb-3 outline-none" onChange={(e) => setGenderSel({...genderSel, [z.id]: e.target.value})}>
                                        <option value="">লিঙ্গ নির্বাচন করুন</option>
                                        <option value="male">পুরুষ টিউটর</option>
                                        <option value="female">মহিলা টিউটর</option>
                                    </select>
                                    {genderSel[z.id] && (
                                        <button onClick={() => handleJoin(z, genderSel[z.id])} className="w-full py-3 bg-[var(--primary)] text-white rounded-xl font-bold text-sm shadow-lg flex justify-center items-center gap-2">
                                            {loadingZone === z.id ? "লোডিং..." : "হোয়াটসঅ্যাপ গ্রুপ"}
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>
                    <footer className="p-10 border-t mt-16 text-center text-gray-400 text-xs">
                        <p>{config.texts.footerText.val}</p>
                    </footer>
                </div>
            );
        }

        function AdminPanel({ config, save, close }) {
            const [tab, setTab] = useState('general');
            const [temp, setTemp] = useState(JSON.parse(JSON.stringify(config)));
            const [isSaving, setIsSaving] = useState(false);

            const handleSave = async () => {
                setIsSaving(true);
                await save(temp);
                setIsSaving(false);
                close();
                alert('Cloud Updated!');
            };

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-4xl h-[80vh] rounded-[30px] flex flex-col overflow-hidden">
                        <div className="p-4 bg-[var(--primary)] text-white flex justify-between items-center">
                            <span className="font-bold">ADMIN PANEL</span>
                            <button onClick={close}><i data-lucide="x"></i></button>
                        </div>
                        <div className="flex-1 flex overflow-hidden">
                            <div className="w-1/3 bg-slate-50 p-4 space-y-2 border-r">
                                {['general', 'texts', 'zones'].map(t => (
                                    <button key={t} onClick={() => setTab(t)} className={`w-full text-left p-3 rounded-xl font-bold capitalize ${tab === t ? 'bg-[var(--primary)] text-white' : 'text-slate-400'}`}>{t}</button>
                                ))}
                                <button onClick={handleSave} className="w-full mt-4 py-3 bg-green-600 text-white rounded-xl font-bold">{isSaving ? 'Saving...' : 'Update Cloud'}</button>
                            </div>
                            <div className="flex-1 p-6 overflow-y-auto">
                                {tab === 'general' && (
                                    <div className="space-y-4">
                                        <input value={temp.logo} onChange={e => setTemp({...temp, logo: e.target.value})} className="w-full p-3 bg-slate-100 rounded-xl" placeholder="Logo URL" />
                                        <input type="color" value={temp.themeColor} onChange={e => setTemp({...temp, themeColor: e.target.value})} className="w-full h-10" />
                                    </div>
                                )}
                                {tab === 'texts' && (
                                    <div className="space-y-4">
                                        {Object.keys(temp.texts).map(k => (
                                            <div key={k} className="p-4 border rounded-xl">
                                                <p className="text-[10px] font-bold text-gray-400 uppercase">{k}</p>
                                                <input value={temp.texts[k].val} onChange={e => { const n = {...temp}; n.texts[k].val = e.target.value; setTemp(n); }} className="w-full p-2 bg-slate-50 rounded mt-1" />
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        setInterval(() => { if (window.lucide) window.lucide.createIcons(); }, 1000);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
