<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutors Valley | Home Tutors in Dhaka</title>
    <meta name="description" content="Find home tutors in Dhaka easily. Tutors Valley is a trusted platform.">
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 30 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Anek+Bangla:wght@400;700&family=Mina:wght@400;700&family=Atma:wght@400;700&family=Galada&family=Li+Adador+Lipi&family=Siyam+Rupali&family=Noto+Serif+Bengali&family=Tiro+Bangla&family=Kalpurush&family=Charukola+Ultra+Light&family=SolaimanLipi&family=AdorshoLipi&family=Nikosh&family=SutonnyBangla&family=Poppins:wght@400;700&family=Roboto:wght@400;700&family=Montserrat:wght@400;700&family=Open+Sans&family=Lato&family=Oswald&family=Raleway&family=Ubuntu&family=Merriweather&family=Playfair+Display&family=Lora&family=Nunito&family=Kanit&family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; transition: background 0.3s; -webkit-tap-highlight-color: transparent; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #1e3a8a; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .zone-card { border-radius: 20px; background: white; border: 1px solid #eee; transition: 0.3s; }
        .zone-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .admin-lock { opacity: 0.1; cursor: pointer; transition: 0.3s; }
        .admin-lock:hover { opacity: 1; color: #1e3a8a; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ADMIN_CRED = { email: "kabirhasanat7@gmail.com", pass: "admin1" };
        const FONT_LIST = [
            "Hind Siliguri", "Anek Bangla", "Mina", "Atma", "Galada", "Li Adador Lipi", "Siyam Rupali", "Noto Serif Bengali", "Tiro Bangla", "SolaimanLipi",
            "Poppins", "Roboto", "Montserrat", "Open Sans", "Lato", "Oswald", "Raleway", "Ubuntu", "Merriweather", "Playfair Display", "Lora", "Nunito", "Kanit", "Bebas Neue", "Pacifico"
        ];

        function App() {
            const [view, setView] = useState("landing"); // landing, login, home
            const [loading, setLoading] = useState(false);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem("tv_user")) || null);
            const [usersDB, setUsersDB] = useState(JSON.parse(localStorage.getItem("tv_db")) || []);
            const [selGender, setSelGender] = useState({}); // Session temp UI reset

            const [settings, setSettings] = useState(JSON.parse(localStorage.getItem("tv_settings")) || {
                bannerColor: "#1e3a8a",
                logo: "https://i.ibb.co/hRT1DFmF/logo.png",
                ceoImg: "https://i.ibb.co/Gvm6RLwW/ceo.png",
                
                // Text Sections
                headerTitle: { text: "Tutors Valley", font: "Poppins", size: "24px", color: "#ffffff" },
                heroTitle: { text: "Tutors Valley", font: "Poppins", size: "45px", color: "#1e3a8a" },
                heroMotto: { text: "ঢাকার শহরে আমরাই দিচ্ছি সেরা টিউটর", font: "Hind Siliguri", size: "22px", color: "#3b82f6" },
                aboutDesc: { text: "Tutors Valley is a trusted platform for finding home tutors in Dhaka. We connect students with the best educators.", font: "Hind Siliguri", size: "18px", color: "#4b5563" },
                ceoName: { text: "Message from CEO", font: "Poppins", size: "22px", color: "#111827" },
                ceoMsg: { text: "We ensure quality education at your doorstep.", font: "Hind Siliguri", size: "16px", color: "#6b7280" },
                footerText: { text: "© 2024 Tutors Valley. All Rights Reserved.", font: "Poppins", size: "14px", color: "#9ca3af" },

                zones: [
                    { id: 1, name: "Uttara", tags: "Sector 1-14, Azampur", ml: "#", fl: "#" },
                    { id: 2, name: "Gulshan", tags: "Gulshan 1, 2, Banani", ml: "#", fl: "#" },
                    { id: 3, name: "Dhanmondi", tags: "Road 15, 27", ml: "#", fl: "#" },
                    { id: 4, name: "Mirpur", tags: "Mirpur 1, 10, Pallabi", ml: "#", fl: "#" },
                    { id: 5, name: "Mohammadpur", tags: "Town Hall, Adabor", ml: "#", fl: "#" },
                    { id: 6, name: "Badda", tags: "Rampura, Banasree", ml: "#", fl: "#" }
                ]
            });

            // Persistence
            useEffect(() => {
                localStorage.setItem("tv_settings", JSON.stringify(settings));
                localStorage.setItem("tv_db", JSON.stringify(usersDB));
                if(user) {
                    localStorage.setItem("tv_user", JSON.stringify(user));
                    localStorage.setItem("tv_last_login", JSON.stringify(user));
                    setView("home");
                }
            }, [settings, usersDB, user]);

            // 5 Minute Inactivity Logic (Reset Gender Selection only)
            useEffect(() => {
                let timer;
                const resetUI = () => setSelGender({});
                const activity = () => {
                    clearTimeout(timer);
                    timer = setTimeout(resetUI, 5 * 60 * 1000);
                };
                window.onmousemove = activity;
                window.onclick = activity;
                return () => clearTimeout(timer);
            }, []);

            const navigate = (to) => {
                setLoading(true);
                setTimeout(() => { setView(to); setLoading(false); }, 700);
            };

            const handleLogin = (e, p) => {
                if(e === ADMIN_CRED.email && p === ADMIN_CRED.pass) {
                    setUser({ email: e, role: "Admin" });
                    navigate("home");
                } else {
                    const found = usersDB.find(u => u.email === e && u.pass === p);
                    if(found) { setUser(found); navigate("home"); }
                    else alert("Invalid credentials!");
                }
            };

            const handleSignup = (e, p, r) => {
                if(usersDB.find(u => u.email === e)) return alert("Email already exists!");
                setUsersDB([...usersDB, { email: e, pass: p, role: r }]);
                alert("Signup Successful!");
            };

            const Header = () => (
                <header className="bg-white border-b" style={{backgroundColor: settings.bannerColor}}>
                    <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center relative h-24">
                        <div className="z-10">
                            {user?.role === 'Admin' && <AdminPanel settings={settings} setSettings={setSettings} />}
                        </div>
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <img src={settings.logo} className="w-10 h-10 rounded-full border-2 border-white pointer-events-auto shadow-md" />
                            <h1 style={{fontFamily: settings.headerTitle.font, fontSize: "16px", color: settings.headerTitle.color}} className="font-bold">{settings.headerTitle.text}</h1>
                        </div>
                        <div className="flex items-center gap-3 z-10">
                            <a href="#" target="_blank" className="text-white text-xl"><i className="fa-brands fa-facebook"></i></a>
                            {user && <button onClick={() => { localStorage.removeItem("tv_user"); setUser(null); navigate("landing"); }} className="bg-red-500 text-white px-3 py-1 rounded text-[10px] font-bold uppercase">Logout</button>}
                        </div>
                    </div>
                </header>
            );

            // --- Views ---
            if(loading) return <div className="fixed inset-0 flex items-center justify-center bg-white z-[9999]"><div className="spinner"></div></div>;

            if(view === "landing") return (
                <div className="min-h-screen flex flex-col items-center">
                    <Header />
                    <div className="flex-1 flex flex-col items-center py-16 px-6 text-center">
                        <img src={settings.logo} className="w-32 h-32 rounded-full border-4 border-white shadow-2xl mb-8" />
                        <h1 style={{fontFamily: settings.heroTitle.font, fontSize: settings.heroTitle.size, color: settings.heroTitle.color}} className="font-bold mb-2">
                            {settings.heroTitle.text}
                        </h1>
                        <p style={{fontFamily: settings.heroMotto.font, fontSize: settings.heroMotto.size, color: settings.heroMotto.color}} className="font-bold mb-10">
                            {settings.heroMotto.text}
                        </p>
                        <div className="max-w-3xl bg-white p-10 rounded-[40px] shadow-sm border mb-12">
                            <p style={{fontFamily: settings.aboutDesc.font, fontSize: settings.aboutDesc.size, color: settings.aboutDesc.color}} className="leading-relaxed">
                                {settings.aboutDesc.text}
                            </p>
                        </div>
                        <button onClick={() => navigate("login")} className="bg-blue-800 text-white px-12 py-4 rounded-full text-xl font-bold shadow-2xl hover:scale-105 active:scale-95 transition">
                            Login / Join Now
                        </button>
                        <footer className="mt-auto py-10">
                            <p style={{fontFamily: settings.footerText.font, fontSize: settings.footerText.size, color: settings.footerText.color}}>{settings.footerText.text}</p>
                        </footer>
                    </div>
                </div>
            );

            if(view === "login") return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-md p-10 rounded-[40px] shadow-2xl relative">
                        <img src={settings.logo} className="w-16 h-16 mx-auto mb-6 rounded-full cursor-pointer" onClick={() => navigate("landing")} />
                        
                        <LoginForm handleLogin={handleLogin} handleSignup={handleSignup} />

                        <div className="mt-8 flex justify-between items-center border-t pt-4">
                            <button onClick={() => handleLogin("Guest", "Guest")} className="text-gray-400 text-xs font-bold uppercase">Guest Mode</button>
                            <div className="admin-lock" onClick={() => {
                                const m = prompt("Admin Email:"); const p = prompt("Password:");
                                if(m && p) handleLogin(m,p);
                            }}><i className="fa-solid fa-lock"></i></div>
                        </div>
                    </div>
                </div>
            );

            if(view === "home") return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <div className="py-16 text-center bg-white border-b mb-10">
                        <h2 style={{fontFamily: settings.heroTitle.font, color: settings.bannerColor}} className="text-3xl font-bold uppercase tracking-widest">Available Zones</h2>
                        <p className="text-gray-400 mt-2">{settings.heroMotto.text}</p>
                    </div>

                    <div className="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {settings.zones.map(z => (
                            <ZoneCard key={z.id} z={z} user={user} selGender={selGender} setSelGender={setSelGender} />
                        ))}
                    </div>

                    <div className="mt-24 flex flex-col items-center text-center px-6 mb-20">
                        <img src={settings.ceoImg} className="w-36 h-36 rounded-full border-4 border-white shadow-2xl mb-4 object-cover" />
                        <h3 style={{fontFamily: settings.ceoName.font, fontSize: settings.ceoName.size, color: settings.ceoName.color}} className="font-bold">
                            {settings.ceoName.text}
                        </h3>
                        <p style={{fontFamily: settings.ceoMsg.font, fontSize: settings.ceoMsg.size, color: settings.ceoMsg.color}} className="italic mt-2 max-w-xl">
                            "{settings.ceoMsg.text}"
                        </p>
                    </div>
                    
                    <footer className="bg-white py-12 text-center border-t">
                        <p style={{fontFamily: settings.footerText.font, fontSize: settings.footerText.size, color: settings.footerText.color}}>
                            {settings.footerText.text}
                        </p>
                    </footer>
                </div>
            );
        }

        // --- Login Subcomponent ---
        function LoginForm({ handleLogin, handleSignup }) {
            const [isLog, setIsLog] = useState(true);
            const [e, setE] = useState(""); const [p, setP] = useState(""); const [r, setR] = useState("Tutor");
            const last = JSON.parse(localStorage.getItem("tv_last_login"));

            return (
                <div className="space-y-4">
                    {isLog && last && (
                        <div className="mb-4 p-4 bg-blue-50 rounded-2xl border flex justify-between items-center">
                            <div className="text-xs font-bold uppercase tracking-tight">
                                <p>{last.email}</p>
                                <p className="opacity-50">{last.role}</p>
                            </div>
                            <button onClick={() => handleLogin(last.email, last.pass)} className="bg-blue-800 text-white px-4 py-2 rounded-xl text-xs font-bold">Quick Entry</button>
                        </div>
                    )}
                    <div className="flex bg-gray-100 p-1 rounded-2xl mb-4">
                        <button onClick={() => setIsLog(true)} className={`flex-1 py-3 rounded-xl font-bold text-sm ${isLog ? 'bg-white shadow' : 'text-gray-400'}`}>লগইন</button>
                        <button onClick={() => setIsLog(false)} className={`flex-1 py-3 rounded-xl font-bold text-sm ${!isLog ? 'bg-white shadow' : 'text-gray-400'}`}>সাইন আপ</button>
                    </div>
                    <input type="email" placeholder="Email" className="w-full p-4 bg-gray-50 border rounded-2xl outline-none" onChange={v => setE(v.target.value)} />
                    <input type="password" placeholder="Password" className="w-full p-4 bg-gray-50 border rounded-2xl outline-none" onChange={v => setP(v.target.value)} />
                    {!isLog && (
                        <select className="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold" onChange={v => setR(v.target.value)}>
                            <option value="Tutor">Tutor</option>
                            <option value="Guardian">Guardian</option>
                        </select>
                    )}
                    <button onClick={() => isLog ? handleLogin(e, p) : handleSignup(e, p, r)} className="w-full bg-blue-800 text-white py-4 rounded-2xl font-bold shadow-lg">
                        {isLog ? "প্রবেশ করুন" : "রেজিস্ট্রেশন করুন"}
                    </button>
                </div>
            );
        }

        // --- Zone Card Subcomponent ---
        function ZoneCard({ z, user, selGender, setSelGender }) {
            const [loading, setLoading] = useState(false);
            const select = (val) => {
                if(!val) return;
                setLoading(true);
                setTimeout(() => { setSelGender(prev => ({...prev, [z.id]: val})); setLoading(false); }, 2000);
            };

            return (
                <div className="zone-card p-8 flex flex-col items-center text-center">
                    <div className="w-14 h-14 bg-blue-50 text-blue-800 rounded-full flex items-center justify-center mb-4 text-2xl shadow-inner"><i className="fa-solid fa-map-pin"></i></div>
                    <h3 className="text-2xl font-bold text-gray-800">{z.name}</h3>
                    <p className="text-gray-500 text-sm mt-1 mb-6 bg-gray-50 px-4 py-1 rounded-full">{z.tags}</p>

                    {user.role === 'Tutor' && (
                        <div className="w-full">
                            {!selGender[z.id] ? (
                                loading ? <div className="flex justify-center py-2"><div className="spinner !w-6 !h-6"></div></div> : (
                                    <select className="w-full p-3 border rounded-xl font-bold text-sm bg-gray-50" onChange={e => select(e.target.value)}>
                                        <option value="">জেন্ডার সিলেক্ট করুন</option>
                                        <option value="male">আমি পুরুষ টিউটর</option>
                                        <option value="female">আমি মহিলা টিউটর</option>
                                    </select>
                                )
                            ) : (
                                <a href={selGender[z.id] === 'male' ? z.ml : z.fl} target="_blank" className="block w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg animate-pulse">Join WhatsApp Group</a>
                            )}
                        </div>
                    )}
                    {user.role === 'Admin' && (
                        <div className="flex gap-2 w-full">
                            <a href={z.ml} target="_blank" className="flex-1 bg-blue-800 text-white py-2 rounded-xl text-[10px] font-bold">MALE</a>
                            <a href={z.fl} target="_blank" className="flex-1 bg-blue-800 text-white py-2 rounded-xl text-[10px] font-bold">FEMALE</a>
                        </div>
                    )}
                    {(user.role === 'Guardian' || user.role === 'Guest') && <span className="text-[10px] text-gray-300 font-bold uppercase tracking-widest">View Mode</span>}
                </div>
            );
        }

        // --- Admin Control Panel ---
        function AdminPanel({ settings, setSettings }) {
            const [open, setOpen] = useState(false);

            const EditStyle = ({ label, target }) => (
                <div className="p-4 bg-gray-50 rounded-2xl border space-y-3">
                    <p className="text-[10px] font-bold text-blue-900 uppercase border-b pb-1">{label}</p>
                    <textarea value={settings[target].text} className="w-full p-2 text-sm border rounded-lg" onChange={e => setSettings({...settings, [target]: {...settings[target], text: e.target.value}})} />
                    <div className="grid grid-cols-3 gap-2">
                        <select className="text-[10px] p-1 border rounded" value={settings[target].font} onChange={e => setSettings({...settings, [target]: {...settings[target], font: e.target.value}})}>
                            {FONT_LIST.map(f => <option key={f} value={f}>{f}</option>)}
                        </select>
                        <input className="text-[10px] p-1 border rounded" value={settings[target].size} onChange={e => setSettings({...settings, [target]: {...settings[target], size: e.target.value}})} />
                        <input type="color" className="w-full h-6 rounded" value={settings[target].color} onChange={e => setSettings({...settings, [target]: {...settings[target], color: e.target.value}})} />
                    </div>
                </div>
            );

            return (
                <>
                    <i className="fa-solid fa-gear text-xl cursor-pointer text-white/50 hover:text-white" onClick={() => setOpen(true)}></i>
                    {open && (
                        <div className="fixed inset-0 bg-black/80 z-[1000] p-4 flex items-center justify-center backdrop-blur-sm">
                            <div className="bg-white w-full max-w-5xl max-h-[90vh] overflow-y-auto rounded-3xl p-8">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold">Advanced Editor</h2>
                                    <i className="fa-solid fa-xmark text-2xl cursor-pointer text-gray-400" onClick={() => setOpen(false)}></i>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <EditStyle label="Branding Title" target="headerTitle" />
                                    <EditStyle label="Landing Title" target="heroTitle" />
                                    <EditStyle label="Branding Motto" target="heroMotto" />
                                    <EditStyle label="About Description" target="aboutDesc" />
                                    <EditStyle label="CEO Name" target="ceoName" />
                                    <EditStyle label="CEO Message" target="ceoMsg" />
                                    <EditStyle label="Footer Text" target="footerText" />
                                    
                                    <div className="p-4 bg-blue-50 rounded-2xl border">
                                        <p className="text-[10px] font-bold text-blue-900 uppercase border-b mb-3">Assets & Colors</p>
                                        <div className="space-y-4">
                                            <input type="color" className="w-full h-10 rounded-xl" value={settings.bannerColor} onChange={e => setSettings({...settings, bannerColor: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-2">
                                                <label className="bg-white p-3 border rounded-xl text-center text-[10px] font-bold cursor-pointer">LOGO <input type="file" className="hidden" onChange={e => {
                                                    const f = e.target.files[0]; const r = new FileReader();
                                                    r.onloadend = () => setSettings({...settings, logo: r.result}); if(f) r.readAsDataURL(f);
                                                }} /></label>
                                                <label className="bg-white p-3 border rounded-xl text-center text-[10px] font-bold cursor-pointer">CEO IMAGE <input type="file" className="hidden" onChange={e => {
                                                    const f = e.target.files[0]; const r = new FileReader();
                                                    r.onloadend = () => setSettings({...settings, ceoImg: r.result}); if(f) r.readAsDataURL(f);
                                                }} /></label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-10 pt-10 border-t">
                                    <h3 className="text-xl font-bold mb-6 text-blue-900">Zone Manager</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {settings.zones.map(z => (
                                            <div key={z.id} className="p-4 bg-gray-50 rounded-2xl border space-y-2">
                                                <input value={z.name} className="w-full p-2 border rounded-lg text-sm font-bold" onChange={e => {
                                                    const nz = settings.zones.map(x => x.id === z.id ? {...x, name: e.target.value} : x);
                                                    setSettings({...settings, zones: nz});
                                                }} />
                                                <input value={z.tags} className="w-full p-2 border rounded-lg text-xs" onChange={e => {
                                                    const nz = settings.zones.map(x => x.id === z.id ? {...x, tags: e.target.value} : x);
                                                    setSettings({...settings, zones: nz});
                                                }} />
                                                <div className="grid grid-cols-2 gap-2">
                                                    <input value={z.ml} className="p-2 border rounded text-[10px] text-blue-600" placeholder="Male Link" onChange={e => {
                                                        const nz = settings.zones.map(x => x.id === z.id ? {...x, ml: e.target.value} : x);
                                                        setSettings({...settings, zones: nz});
                                                    }} />
                                                    <input value={z.fl} className="p-2 border rounded text-[10px] text-pink-600" placeholder="Female Link" onChange={e => {
                                                        const nz = settings.zones.map(x => x.id === z.id ? {...x, fl: e.target.value} : x);
                                                        setSettings({...settings, zones: nz});
                                                    }} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => setOpen(false)} className="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mt-10 shadow-lg">Save & Close</button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
