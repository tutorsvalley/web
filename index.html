<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutors Valley | Home Tutors in Dhaka</title>
    
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Poppins:wght@400;700&family=Mina&family=Atma&family=Galada&family=Noto+Serif+Bengali&family=Tiro+Bangla&family=Roboto&family=Montserrat&family=Open+Sans&family=Oswald&family=Raleway&family=Ubuntu&family=Playfair+Display&family=Lora&family=Nunito&family=Kanit&family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet">

    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; transition: background 0.3s; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #1e3a8a; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .zone-card { border-radius: 20px; background: white; border: 1px solid #eee; transition: 0.3s; }
        .zone-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        select, input, textarea { outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ADMIN_CRED = { email: "kabirhasanat7@gmail.com", pass: "admin1" };
        const FONT_LIST = ["Hind Siliguri", "Anek Bangla", "Mina", "Atma", "Galada", "Noto Serif Bengali", "Tiro Bangla", "Poppins", "Roboto", "Montserrat", "Open Sans", "Oswald", "Raleway", "Ubuntu", "Playfair Display", "Lora", "Nunito", "Kanit", "Bebas Neue", "Pacifico"];

        function App() {
            const [view, setView] = useState("landing");
            const [loading, setLoading] = useState(false);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem("tv_user")) || null);
            const [usersDB, setUsersDB] = useState(JSON.parse(localStorage.getItem("tv_db")) || []);
            
            const [settings, setSettings] = useState(JSON.parse(localStorage.getItem("tv_settings")) || {
                bannerColor: "#1e3a8a",
                logo: "https://i.ibb.co/hRT1DFmF/logo.png",
                ceoImg: "https://i.ibb.co/Gvm6RLwW/ceo.png",
                title: { text: "Tutors Valley", font: "Poppins", size: "32px", color: "#1e3a8a" },
                motto: { text: "ঢাকার শহরে আমরাই দিচ্ছি সেরা টিউটর", font: "Hind Siliguri", size: "18px", color: "#3b82f6" },
                about: { text: "Tutors Valley হলো ঢাকার একটি বিশ্বস্ত টিউটর প্ল্যাটফর্ম।", font: "Hind Siliguri", size: "16px", color: "#4b5563" },
                ceoMsg: { text: "গুণগত শিক্ষা আমাদের লক্ষ্য।", font: "Hind Siliguri", size: "15px", color: "#6b7280" },
                footer: { text: "© 2024 Tutors Valley. All Rights Reserved.", font: "Poppins", size: "12px", color: "#9ca3af" },
                zones: [
                    { id: 1, name: "Uttara", tags: "Sector 1-14", ml: "#", fl: "#" },
                    { id: 2, name: "Gulshan", tags: "Gulshan 1, 2", ml: "#", fl: "#" },
                    { id: 3, name: "Dhanmondi", tags: "Road 15, 27", ml: "#", fl: "#" },
                    { id: 4, name: "Mirpur", tags: "Mirpur 1, 10", ml: "#", fl: "#" },
                    { id: 5, name: "Mohammadpur", tags: "Town Hall", ml: "#", fl: "#" },
                    { id: 6, name: "Badda", tags: "Rampura", ml: "#", fl: "#" }
                ]
            });

            useEffect(() => {
                localStorage.setItem("tv_settings", JSON.stringify(settings));
                localStorage.setItem("tv_db", JSON.stringify(usersDB));
                if(user) localStorage.setItem("tv_user", JSON.stringify(user));
            }, [settings, usersDB, user]);

            const triggerLoad = (callback) => {
                setLoading(true);
                setTimeout(() => { callback(); setLoading(false); }, 800);
            };

            const handleLogin = (e, p) => {
                if(e === ADMIN_CRED.email && p === ADMIN_CRED.pass) {
                    setUser({email: e, role: "Admin"});
                    triggerLoad(() => setView("home"));
                } else {
                    const u = usersDB.find(x => x.email === e && x.pass === p);
                    if(u) { setUser(u); triggerLoad(() => setView("home")); }
                    else alert("ভুল তথ্য!");
                }
            };

            const SiteHeader = () => (
                <div className="w-full text-white py-4 px-6 flex justify-between items-center" style={{backgroundColor: settings.bannerColor}}>
                    <div className="w-8">
                        {user?.role === 'Admin' && <AdminControl settings={settings} setSettings={setSettings} />}
                    </div>
                    <div className="text-center">
                        <img src={settings.logo} className="w-10 h-10 rounded-full border-2 border-white mx-auto" />
                        <h1 style={{fontFamily: settings.title.font, fontSize: "16px"}} className="font-bold">{settings.title.text}</h1>
                    </div>
                    <div className="flex gap-3 items-center">
                        <a href="#"><i className="fa-brands fa-facebook text-xl"></i></a>
                        {user && <button onClick={() => { localStorage.removeItem("tv_user"); setUser(null); setView("landing"); }} className="bg-red-500 px-2 py-1 rounded text-[10px] font-bold">LOGOUT</button>}
                    </div>
                </div>
            );

            if(loading) return <div className="fixed inset-0 flex items-center justify-center bg-white z-[9999]"><div className="spinner"></div></div>;

            if(view === "landing") return (
                <div className="min-h-screen bg-gray-50">
                    <SiteHeader />
                    <div className="flex flex-col items-center py-16 px-6 text-center">
                        <img src={settings.logo} className="w-28 h-28 rounded-full shadow-xl mb-6" />
                        <h1 style={{fontFamily: settings.title.font, fontSize: settings.title.size, color: settings.title.color}} className="font-bold">{settings.title.text}</h1>
                        <p style={{fontFamily: settings.motto.font, fontSize: settings.motto.size, color: settings.motto.color}} className="mt-2 font-bold">{settings.motto.text}</p>
                        <div className="max-w-2xl bg-white p-8 rounded-[30px] shadow-sm border mt-10">
                            <p style={{fontFamily: settings.about.font, fontSize: settings.about.size, color: settings.about.color}}>{settings.about.text}</p>
                        </div>
                        <button onClick={() => triggerLoad(() => setView("login"))} className="mt-12 bg-blue-800 text-white px-10 py-4 rounded-full font-bold shadow-lg">Login / Join Now</button>
                        <p className="mt-20" style={{fontFamily: settings.footer.font, fontSize: settings.footer.size, color: settings.footer.color}}>{settings.footer.text}</p>
                    </div>
                </div>
            );

            if(view === "login") return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-md p-8 rounded-[40px] shadow-xl text-center">
                        <img src={settings.logo} className="w-16 h-16 mx-auto mb-6 rounded-full cursor-pointer" onClick={() => setView("landing")} />
                        <h2 className="text-xl font-bold mb-6">প্রবেশ করুন</h2>
                        <input id="l_email" type="email" placeholder="ইমেইল" className="w-full p-3 mb-3 border rounded-xl" />
                        <input id="l_pass" type="password" placeholder="পাসওয়ার্ড" className="w-full p-3 mb-6 border rounded-xl" />
                        <button onClick={() => handleLogin(document.getElementById('l_email').value, document.getElementById('l_pass').value)} className="w-full bg-blue-800 text-white py-3 rounded-xl font-bold">Login</button>
                        <div className="flex justify-between mt-6 px-2">
                            <button onClick={() => handleLogin("Guest", "Guest")} className="text-gray-400 text-xs font-bold uppercase">Guest Mode</button>
                            <i className="fa-solid fa-lock text-gray-200 cursor-pointer" onClick={() => {
                                const m = prompt("Admin Email:"); const p = prompt("Pass:");
                                handleLogin(m,p);
                            }}></i>
                        </div>
                    </div>
                </div>
            );

            if(view === "home") return (
                <div className="min-h-screen bg-gray-50">
                    <SiteHeader />
                    <div className="py-12 px-6 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
                        {settings.zones.map(z => (
                            <ZoneItem key={z.id} z={z} user={user} />
                        ))}
                    </div>
                    <div className="text-center py-10">
                        <img src={settings.ceoImg} className="w-32 h-32 rounded-full border-4 border-white mx-auto shadow-lg mb-4" />
                        <h3 style={{fontFamily: settings.title.font}} className="font-bold">Message from CEO</h3>
                        <p className="italic mt-2" style={{fontFamily: settings.ceoMsg.font, fontSize: settings.ceoMsg.size, color: settings.ceoMsg.color}}>{settings.ceoMsg.text}</p>
                    </div>
                    <div className="text-center p-6 bg-white border-t">
                        <p style={{fontFamily: settings.footer.font, fontSize: settings.footer.size, color: settings.footer.color}}>{settings.footer.text}</p>
                    </div>
                </div>
            );
        }

        function ZoneItem({ z, user }) {
            const [sel, setSel] = useState("");
            const [loading, setLoading] = useState(false);
            const goLink = (val) => {
                if(!val) return;
                setLoading(true);
                setTimeout(() => { setSel(val); setLoading(false); }, 2000);
            };
            return (
                <div className="zone-card p-6 flex flex-col items-center text-center">
                    <div className="w-12 h-12 bg-blue-50 text-blue-800 rounded-full flex items-center justify-center mb-4"><i className="fa-solid fa-location-dot"></i></div>
                    <h3 className="font-bold text-lg">{z.name}</h3>
                    <p className="text-xs text-gray-400 mb-4">{z.tags}</p>
                    {user.role === 'Tutor' && (
                        <div className="w-full">
                            {!sel ? (
                                loading ? <div className="spinner !w-6 !h-6 mx-auto"></div> : (
                                    <select className="w-full p-2 border rounded-lg text-sm font-bold" onChange={e => goLink(e.target.value)}>
                                        <option value="">জেন্ডার সিলেক্ট করুন</option>
                                        <option value="male">আমি পুরুষ টিউটর</option>
                                        <option value="female">আমি মহিলা টিউটর</option>
                                    </select>
                                )
                            ) : (
                                <a href={sel === 'male' ? z.ml : z.fl} target="_blank" className="block w-full bg-green-600 text-white py-2 rounded-lg font-bold text-sm animate-pulse">Join Group</a>
                            )}
                        </div>
                    )}
                    {user.role === 'Admin' && <p className="text-[10px] text-blue-400 uppercase font-bold">Admin Managed</p>}
                    {(user.role === 'Guardian' || user.role === 'Guest') && <p className="text-[10px] text-gray-300 font-bold uppercase">View Mode</p>}
                </div>
            );
        }

        function AdminControl({ settings, setSettings }) {
            const [show, setShow] = useState(false);
            const EditSec = ({ label, target }) => (
                <div className="p-3 bg-gray-50 border rounded-xl mb-3">
                    <p className="text-[10px] font-bold text-blue-900 mb-1">{label}</p>
                    <textarea value={settings[target].text} className="w-full p-2 text-sm border mb-2" onChange={e => setSettings({...settings, [target]: {...settings[target], text: e.target.value}})} />
                    <div className="flex gap-2">
                        <select className="flex-1 text-[10px] p-1 border" value={settings[target].font} onChange={e => setSettings({...settings, [target]: {...settings[target], font: e.target.value}})}>
                            {FONT_LIST.map(f => <option key={f} value={f}>{f}</option>)}
                        </select>
                        <input className="w-14 text-[10px] p-1 border" value={settings[target].size} onChange={e => setSettings({...settings, [target]: {...settings[target], size: e.target.value}})} />
                        <input type="color" className="w-8 h-6 border" value={settings[target].color} onChange={e => setSettings({...settings, [target]: {...settings[target], color: e.target.value}})} />
                    </div>
                </div>
            );

            return (
                <>
                    <i className="fa-solid fa-gear cursor-pointer" onClick={() => setShow(true)}></i>
                    {show && (
                        <div className="fixed inset-0 bg-black/80 z-[1000] p-4 flex items-center justify-center">
                            <div className="bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto p-6 rounded-3xl">
                                <div className="flex justify-between items-center mb-6 border-b pb-2">
                                    <h2 className="font-bold">অ্যাডমিন কন্ট্রোল</h2>
                                    <i className="fa-solid fa-xmark cursor-pointer" onClick={() => setShow(false)}></i>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <EditSec label="Main Title" target="title" />
                                    <EditSec label="Hero Motto" target="motto" />
                                    <EditSec label="About Text" target="about" />
                                    <EditSec label="CEO Message" target="ceoMsg" />
                                    <EditSec label="Footer Text" target="footer" />
                                    <div className="p-3 bg-blue-50 border rounded-xl">
                                        <p className="text-[10px] font-bold mb-2">ব্র্যান্ডিং ও ইমেজ</p>
                                        <div className="flex flex-col gap-2">
                                            <input type="color" className="w-full h-8" value={settings.bannerColor} onChange={e => setSettings({...settings, bannerColor: e.target.value})} />
                                            <label className="text-[10px] bg-white p-2 border cursor-pointer text-center">LOGO <input type="file" className="hidden" onChange={e => {
                                                const f = e.target.files[0]; const r = new FileReader(); r.onloadend = () => setSettings({...settings, logo: r.result}); if(f) r.readAsDataURL(f);
                                            }}/></label>
                                            <label className="text-[10px] bg-white p-2 border cursor-pointer text-center">CEO IMAGE <input type="file" className="hidden" onChange={e => {
                                                const f = e.target.files[0]; const r = new FileReader(); r.onloadend = () => setSettings({...settings, ceoImg: r.result}); if(f) r.readAsDataURL(f);
                                            }}/></label>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setShow(false)} className="w-full bg-green-600 text-white py-3 mt-6 rounded-xl font-bold">সেভ করুন</button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
